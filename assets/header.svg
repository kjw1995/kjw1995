<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 220" width="1200" height="220" fill="none" role="img" aria-label="Kim Jung Woo - Backend Developer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B0D12"/>
      <stop offset="1" stop-color="#000000"/>
    </linearGradient>
    <radialGradient id="nameGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#F97316" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#F97316" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="waveCore" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FDBA74" stop-opacity="1"/>
      <stop offset="0.6" stop-color="#F97316" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#F97316" stop-opacity="0.15"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="220" fill="url(#bg)"/>
  <ellipse cx="600" cy="94" rx="320" ry="74" fill="url(#nameGlow)"/>

  <!-- single glowing propagation wave -->
  <path d="M-50,182 Q25,170 100,182 T250,182 T400,182 T550,182 T700,182 T850,182 T1000,182 T1150,182 T1300,182" stroke="#F97316" stroke-width="9" opacity="0.10" stroke-linecap="round"/>
  <path d="M-50,182 Q25,170 100,182 T250,182 T400,182 T550,182 T700,182 T850,182 T1000,182 T1150,182 T1300,182" stroke="#F97316" stroke-width="4.5" opacity="0.22" stroke-linecap="round"/>
  <path d="M-50,182 Q25,170 100,182 T250,182 T400,182 T550,182 T700,182 T850,182 T1000,182 T1150,182 T1300,182" stroke="url(#waveCore)" stroke-width="2.2" stroke-linecap="round"/>

  <!-- source + crest accents -->
  <circle cx="25" cy="170" r="9" fill="#F97316" opacity="0.18"/>
  <circle cx="25" cy="170" r="3.8" fill="#FDBA74"/>
  <circle cx="325" cy="170" r="2.6" fill="#F97316" opacity="0.75"/>
  <circle cx="625" cy="170" r="2.6" fill="#F97316" opacity="0.5"/>
  <circle cx="925" cy="170" r="2.6" fill="#F97316" opacity="0.3"/>

  <!-- name -->
  <text x="600" y="98" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="44" font-weight="600" fill="#F5F5F5" letter-spacing="8">KIM JUNG WOO</text>
  <line x1="540" y1="118" x2="660" y2="118" stroke="#F97316" stroke-width="2"/>
  <text x="600" y="140" text-anchor="middle" font-family="'Fira Code','Consolas',monospace" font-size="13" font-weight="400" fill="#FB923C" letter-spacing="6">BACKEND DEVELOPER</text>
</svg>
